quarkus.http.host=127.0.0.1
quarkus.http.port=8001

a2a.blocking.agent.timeout.seconds=120
a2a.blocking.consumption.timeout.seconds=120

agent.kind=filesystem
agent.base-url=http://127.0.0.1:8001
agent.peer-urls=http://127.0.0.1:8002
agent.ollama.base-url=http://localhost:11434
agent.ollama.model=llama3.2:3b
agent.ollama.temperature=0.2
agent.ollama.timeout-seconds=120
agent.delegation.enabled=true
agent.delegation.max-hops=2

%filesystem.quarkus.http.port=8001
%filesystem.agent.kind=filesystem
%filesystem.agent.base-url=http://127.0.0.1:8001
%filesystem.agent.peer-urls=http://127.0.0.1:8002
%filesystem.agent.ollama.model=llama3.2:3b

%gmail.quarkus.http.port=8002
%gmail.agent.kind=gmail
%gmail.agent.base-url=http://127.0.0.1:8002
%gmail.agent.peer-urls=http://127.0.0.1:8001
%gmail.agent.ollama.model=llama3.1:8b
